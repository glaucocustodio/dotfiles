# Cycle windows with Option+Left / Option+Right
bind -n M-b previous-window
bind -n M-f next-window

# Unbind the default prefix/leader
unbind C-b
# Set Ctrl+s as the new prefix/leader
set-option -g prefix C-s
# Make sure Ctrl+s sends the prefix/leader
bind C-s send-prefix

# Reload config file and display message
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Start windows and panes numbering at 1 instead of 0 (which is harder to reach in the keyboard)
set -g base-index 1
set -g pane-base-index 1

# Styling
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=white,bg=colour19"
set -g status-right-style "none"
set -g pane-active-border-style "fg=green"
set -g status-style "none,bg=colour18"
set -g message-style "fg=white,bg=colour19"
set -g pane-border-style "fg=colour18"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
set -g status-left "#[fg=black,bg=white] #S "
set -g status-right "#[fg=white,bg=colour19] %Y-%m-%d | %H:%M #[fg=black,bg=white] #h "
setw -g window-status-format "#[fg=colour244,bg=colour18] #I | #W "
setw -g window-status-current-format "#[fg=white,bg=colour21] #I | #W "
